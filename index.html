<!DOCTYPE html>
<!-- 扫雷游戏 © ltwza -->
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>扫雷</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #2c3e50;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
      user-select: none;
    }

    .container {
      background: #ecf0f1;
      border-radius: 14px;
      padding: 20px 24px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-width: 98vw;
      max-height: 98vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 22px;
      color: #2c3e50;
      letter-spacing: 2px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 8px;
    }

    .btn-settings-top {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
      line-height: 1;
    }

    .btn-settings-top:hover {
      background: #dfe6e9;
    }

    .difficulty-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-bar button {
      padding: 5px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #bdc3c7;
      color: #2c3e50;
    }

    .difficulty-bar button:hover {
      opacity: 0.85;
    }

    .difficulty-bar button.active {
      background: #2c3e50;
      color: #fff;
      box-shadow: 0 2px 8px rgba(44, 62, 80, 0.4);
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 600;
      background: #34495e;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      min-height: 36px;
      gap: 10px;
    }

    .info-bar .mine-count {
      color: #e74c3c;
    }

    .info-bar .timer {
      color: #f1c40f;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    .info-bar .timer.danger {
      color: #e74c3c;
      animation: blink 0.6s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0.4;
      }
    }

    .board-wrapper {
      position: relative;
      overflow: auto;
      max-width: 100%;
      border: 2px solid #34495e;
      border-radius: 6px;
      background: #95a5a6;
      touch-action: manipulation;
      -webkit-overflow-scrolling: touch;
    }

    .board {
      display: inline-grid;
      gap: 1px;
      background: #95a5a6;
      margin: 2px;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: max(10px, calc(var(--cell-size) * 0.5));
      font-weight: 800;
      cursor: pointer;
      background: #bdc3c7;
      border: none;
      transition: background 0.08s;
      border-radius: 1px;
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1;
    }

    .cell.hidden:hover {
      background: #aeb6bf;
    }

    .cell.hidden:active {
      background: #95a5a6;
    }

    .cell.revealed {
      background: #dfe6e9;
      cursor: default;
    }

    .cell.revealed.n0 {
      background: #dfe6e9;
    }

    .cell.revealed.n1 {
      color: #2980b9;
    }

    .cell.revealed.n2 {
      color: #27ae60;
    }

    .cell.revealed.n3 {
      color: #e74c3c;
    }

    .cell.revealed.n4 {
      color: #8e44ad;
    }

    .cell.revealed.n5 {
      color: #d35400;
    }

    .cell.revealed.n6 {
      color: #16a085;
    }

    .cell.revealed.n7 {
      color: #2c3e50;
    }

    .cell.revealed.n8 {
      color: #7f8c8d;
    }

    .cell.flagged {
      background: #f9e79f;
    }

    .cell.flagged::after {
      content: '🚩';
      font-size: calc(var(--cell-size) * 0.48);
    }

    .cell.mine {
      background: #e74c3c;
    }

    .cell.mine::after {
      content: '💣';
      font-size: calc(var(--cell-size) * 0.48);
    }

    .cell.mine-revealed {
      background: #f5b7b1;
    }

    .cell.mine-revealed::after {
      content: '💣';
      font-size: calc(var(--cell-size) * 0.48);
    }

    .cell.mine-hit {
      background: #e74c3c;
      animation: hitFlash 0.5s;
    }

    .cell.mine-hit::after {
      content: '💥';
      font-size: calc(var(--cell-size) * 0.48);
    }

    @keyframes hitFlash {

      0%,
      100% {
        background: #e74c3c;
      }

      50% {
        background: #fff;
      }
    }

    .bottom-bar {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .bottom-bar button {
      padding: 6px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-new {
      background: #3498db;
      color: #fff;
    }

    .btn-new:hover {
      background: #2980b9;
    }

    .btn-records {
      background: #9b59b6;
      color: #fff;
    }

    .btn-records:hover {
      background: #8e44ad;
    }

    .btn-leaderboard {
      background: #e74c3c;
      color: #fff;
    }

    .btn-leaderboard:hover {
      background: #c0392b;
    }

    .lb-rule {
      margin-top: 10px;
      padding: 8px 10px;
      background: #f8f9fa;
      border-radius: 6px;
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.5;
    }

    .btn-resume {
      background: #e67e22;
      color: #fff;
    }

    .btn-resume:hover {
      background: #d35400;
    }

    .flag-toggle {
      display: none;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #f39c12;
      color: #fff;
      transition: all 0.15s;
    }

    .flag-toggle.active {
      background: #e67e22;
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #e67e22;
    }

    .flag-toggle.show {
      display: inline-block;
    }

    .flag-toggle::before {
      content: '🚩 插旗';
    }

    .flag-toggle.active::before {
      content: '🚩 插旗中';
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from {
        transform: scale(0.92);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal h2 {
      font-size: 20px;
      color: #2c3e50;
      margin-bottom: 14px;
      text-align: center;
    }

    .records-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .records-tab {
      flex: 1;
      min-width: 60px;
      padding: 6px 4px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ecf0f1;
      color: #7f8c8d;
      transition: all 0.15s;
    }

    .records-tab:hover {
      background: #dfe6e9;
    }

    .records-tab.active {
      background: #34495e;
      color: #fff;
    }

    .modal table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .modal th {
      background: #34495e;
      color: #fff;
      padding: 8px 6px;
      text-align: center;
      font-size: 12px;
    }

    .modal td {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }

    .modal tr:hover td {
      background: #f8f9fa;
    }

    .modal .empty-msg {
      text-align: center;
      color: #95a5a6;
      padding: 20px 0;
      font-size: 14px;
    }

    .modal .modal-close {
      display: block;
      margin: 16px auto 0;
      padding: 7px 30px;
      border: none;
      border-radius: 6px;
      background: #34495e;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal .modal-close:hover {
      background: #2c3e50;
    }

    .confirm-modal {
      max-width: 360px;
    }

    /* Custom difficulty form */
    .custom-form {
      padding: 4px 0;
    }

    .custom-form .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }

    .custom-form .form-row label {
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      min-width: 70px;
    }

    .custom-form .form-row input {
      flex: 1;
      padding: 7px 10px;
      border: 2px solid #bdc3c7;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 0;
      min-width: 60px;
    }

    .custom-form .form-row input:focus {
      border-color: #3498db;
    }

    .custom-form .form-row input.error {
      border-color: #e74c3c;
      background: #fdf0ef;
    }

    .custom-form .form-row .hint {
      font-size: 11px;
      color: #95a5a6;
      min-width: 50px;
      text-align: right;
    }

    .custom-form .form-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }

    .custom-form .form-actions button {
      padding: 7px 28px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .custom-form .form-actions .btn-apply {
      background: #2ecc71;
      color: #fff;
    }

    .custom-form .form-actions .btn-apply:hover {
      background: #27ae60;
    }

    .custom-form .form-actions .btn-cancel {
      background: #95a5a6;
      color: #fff;
    }

    .custom-form .form-actions .btn-cancel:hover {
      background: #7f8c8d;
    }

    .custom-form .form-error {
      color: #e74c3c;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      margin-top: 4px;
    }

    /* Resume toast - centered overlay */
    .resume-toast {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .resume-toast.show {
      display: flex;
    }

    .resume-toast .toast-card {
      background: #2c3e50;
      color: #fff;
      padding: 28px 32px 22px;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      text-align: center;
      max-width: 320px;
      width: 85%;
      animation: popIn 0.25s ease;
    }

    @keyframes popIn {
      from {
        transform: scale(0.85);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .resume-toast .toast-text {
      display: block;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .resume-toast .toast-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .resume-toast button {
      flex: 1;
      max-width: 130px;
      padding: 8px 0;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .resume-toast .btn-yes {
      background: #2ecc71;
      color: #fff;
    }

    .resume-toast .btn-no {
      background: #e74c3c;
      color: #fff;
    }

    .resume-toast .btn-yes:hover {
      background: #27ae60;
    }

    .resume-toast .btn-no:hover {
      background: #c0392b;
    }

    /* Win / Lose animations */
    @keyframes boardWinPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.6);
      }

      70% {
        box-shadow: 0 0 0 20px rgba(46, 204, 113, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(46, 204, 113, 0);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-8px);
      }

      40% {
        transform: translateX(8px);
      }

      60% {
        transform: translateX(-5px);
      }

      80% {
        transform: translateX(5px);
      }
    }

    .flash-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: rgba(255, 50, 50, 0.35);
      opacity: 0;
      transition: none;
    }

    .flash-overlay.active {
      animation: flashFade 0.5s ease-out forwards;
    }

    @keyframes flashFade {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes statusBounce {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    .status-msg.win,
    .status-msg.lose {
      animation: statusBounce 0.5s ease;
    }

    .status-msg {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      min-height: 20px;
      margin-bottom: 6px;
    }

    .status-msg.win {
      color: #27ae60;
    }

    .status-msg.lose {
      color: #e74c3c;
    }

    /* Settings modal */
    .settings-group {
      margin: 14px 0;
    }

    .settings-group label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      color: #2c3e50;
      margin-bottom: 4px;
    }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vol-row input[type="range"] {
      flex: 1;
      accent-color: #2c3e50;
    }

    .vol-row .vol-label {
      min-width: 28px;
      text-align: right;
      font-weight: 600;
      color: #2c3e50;
      font-size: 13px;
    }

    .track-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .track-options label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #2c3e50;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #bdc3c7;
      transition: all 0.2s;
    }

    .track-options label:hover {
      background: #dfe6e9;
    }

    .track-options input[type="radio"] {
      accent-color: #2c3e50;
    }

    @media (max-width: 500px) {
      .container {
        padding: 10px;
        border-radius: 0;
        max-width: 100vw;
        max-height: 100vh;
        border-radius: 0;
      }

      h1 {
        font-size: 18px;
      }

      .info-bar {
        font-size: 12px;
        padding: 4px 10px;
      }

      .difficulty-bar button {
        font-size: 12px;
        padding: 4px 12px;
      }

      .bottom-bar button {
        font-size: 12px;
        padding: 5px 14px;
      }

      .modal {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="title-row">
      <h1>💣 扫雷</h1>
      <button class="btn-settings-top" id="btnSettingsTop">⚙️</button>
    </div>

    <div class="difficulty-bar">
      <button data-diff="easy" class="active">😊 简单 9×9</button>
      <button data-diff="medium">🤔 中等 16×16</button>
      <button data-diff="hard">😈 困难 24×20</button>
      <button data-diff="hell">🔥 地狱 28×30</button>
      <button data-diff="custom">🎨 自定义</button>
    </div>

    <div class="status-msg" id="statusMsg">点击格子开始游戏</div>

    <div class="info-bar">
      <span class="mine-count" id="mineCount">💣 000</span>
      <span class="timer" id="timer">⏱ 00:00</span>
    </div>

    <div class="board-wrapper" id="boardWrapper">
      <div class="board" id="board"></div>
    </div>
    <div class="flash-overlay" id="flashOverlay"></div>

    <div class="bottom-bar">
      <button class="btn-resume" id="btnResume" style="display:none">▶ 继续游戏</button>
      <button class="btn-new" id="btnNew">🔄 新游戏</button>
      <button class="flag-toggle show" id="flagToggle"></button>
      <button class="btn-records" id="btnRecords">📋 通关记录</button>
      <button class="btn-leaderboard" id="btnLeaderboard">🏆 排行榜</button>
    </div>
  </div>

  <!-- Records Modal (recent clears, all difficulties mixed) -->
  <div class="modal-overlay" id="recordsModal">
    <div class="modal">
      <h2>📋 通关记录</h2>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>难度</th>
              <th>用时</th>
              <th>日期</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
      <div class="lb-rule">按通关时间倒序，最新在前，最多显示 10 条</div>
    </div>
  </div>

  <!-- Leaderboard Modal (per-difficulty tabs, no close button) -->
  <div class="modal-overlay" id="leaderboardModal">
    <div class="modal">
      <h2>🏆 排行榜</h2>
      <div class="records-tabs" id="lbTabs">
        <button class="records-tab" data-tab="easy">😊 简单</button>
        <button class="records-tab" data-tab="medium">🤔 中等</button>
        <button class="records-tab" data-tab="hard">😈 困难</button>
        <button class="records-tab" data-tab="hell">🔥 地狱</button>
        <button class="records-tab" data-tab="custom">🎨 自定义</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>模式</th>
              <th>用时</th>
              <th>日期</th>
            </tr>
          </thead>
          <tbody id="lbBody"></tbody>
        </table>
      </div>
      <div class="lb-rule" id="lbRule"></div>
    </div>
  </div>

  <!-- Custom Settings Modal -->
  <div class="modal-overlay" id="customModal">
    <div class="modal">
      <h2>⚙️ 自定义难度</h2>
      <div class="custom-form">
        <div class="form-row">
          <label>宽度</label>
          <input type="number" id="customCols" min="5" max="50" value="15">
          <span class="hint">5 ~ 50</span>
        </div>
        <div class="form-row">
          <label>高度</label>
          <input type="number" id="customRows" min="5" max="50" value="15">
          <span class="hint">5 ~ 50</span>
        </div>
        <div class="form-row">
          <label>雷数</label>
          <input type="number" id="customMines" min="1" max="500" value="50">
          <span class="hint" id="minesHint">1 ~ 225</span>
        </div>
        <div class="form-row">
          <label>限时(秒)</label>
          <input type="number" id="customTimeLimit" min="0" max="3600" value="0">
          <span class="hint">0=不限</span>
        </div>
        <div class="form-error" id="customFormError"></div>
        <div class="form-actions">
          <button class="btn-cancel" id="customCancel">取消</button>
          <button class="btn-apply" id="customApply">✅ 开始游戏</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>⚙️ 音效设置</h2>
      <div class="settings-group">
        <label>🔊 音效</label>
        <div class="vol-row">
          <span>🔈</span>
          <input type="range" id="sfxVolume" min="0" max="100" value="70">
          <span class="vol-label" id="sfxVolLabel">70</span>
        </div>
      </div>
      <div class="settings-group">
        <label>🎵 背景音乐</label>
        <div class="vol-row">
          <span>🔈</span>
          <input type="range" id="bgVolume" min="0" max="100" value="15">
          <span class="vol-label" id="bgVolLabel">15</span>
        </div>
      </div>
      <div class="settings-group">
        <label>🎶 背景音轨</label>
        <div class="track-options" id="bgTrackGroup">
          <label><input type="radio" name="bgTrack" value="0" checked> 🌅 Rising Dawn</label>
          <label><input type="radio" name="bgTrack" value="1"> 🌊 In The Zone</label>
          <label><input type="radio" name="bgTrack" value="2"> 🎮 Games We Used to Play</label>
        </div>
        <div style="font-size:10px;color:#999;margin-top:6px;line-height:1.4;">
          背景音乐采用 <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" style="color:#999;">CC BY
            4.0</a> 许可，作者：Ethereal 88 / FSM Team，来自 <a href="https://www.free-stock-music.com" target="_blank"
            style="color:#999;">free-stock-music.com</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Resume Toast -->
  <div class="resume-toast" id="resumeToast">
    <div class="toast-card">
      <span class="toast-text">📂 检测到未完成的游戏，是否继续？</span>
      <div class="toast-buttons">
        <button class="btn-yes" id="resumeYes">继续</button>
        <button class="btn-no" id="resumeNo">重新开始</button>
      </div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div class="modal-overlay" id="confirmDialog">
    <div class="modal confirm-modal">
      <p id="confirmMsg" style="font-size:15px;color:#2c3e50;margin:12px 0 20px;text-align:center;line-height:1.6;"></p>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button class="modal-close" id="confirmOk"
          style="position:static;background:#2ecc71;color:#fff;padding:8px 28px;font-size:14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;">确定</button>
        <button class="modal-close" id="confirmCancel"
          style="position:static;background:#e74c3c;color:#fff;padding:8px 28px;font-size:14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;">取消</button>
      </div>
    </div>
  </div>
</body>
<script>
  // ============================================================
  //  Configuration
  // ============================================================
  const DIFFICULTIES = {
    easy: { label: '简单', rows: 9, cols: 9, mines: 10, timeLimit: 0 },
    medium: { label: '中等', rows: 16, cols: 16, mines: 40, timeLimit: 600 },
    hard: { label: '困难', rows: 24, cols: 20, mines: 99, timeLimit: 300 },
    hell: { label: '地狱', rows: 30, cols: 28, mines: 200, timeLimit: 180 },
    custom: { label: '自定义', rows: 15, cols: 15, mines: 50, timeLimit: 0, isCustom: true },
  };

  const STORAGE_KEYS = {
    records: 'ms_records',
    save: 'ms_save_state',
    custom: 'ms_custom_config',
  };

  // ============================================================
  //  State
  // ============================================================
  let state = {
    difficulty: 'easy',
    board: [],       // 2D array of cell objects
    rows: 0,
    cols: 0,
    totalMines: 0,
    flagsPlaced: 0,
    revealedCount: 0,
    status: 'idle',  // idle | playing | won | lost
    timer: 0,        // elapsed seconds (or countdown from timeLimit)
    timerInterval: null,
    firstClick: true,
    flagMode: false,  // mobile: toggle flag mode
    gameOver: false,
    timeLimit: 0,     // 0 = no limit
    timerMode: 'elapsed', // 'elapsed' or 'countdown'
  };

  // ============================================================
  //  DOM refs
  // ============================================================
  const boardEl = document.getElementById('board');
  const boardWrapper = document.getElementById('boardWrapper');
  const mineCountEl = document.getElementById('mineCount');
  const timerEl = document.getElementById('timer');
  const statusMsg = document.getElementById('statusMsg');
  const flagToggle = document.getElementById('flagToggle');
  const recordsModal = document.getElementById('recordsModal');
  const recordsBody = document.getElementById('recordsBody');

  // ============================================================
  //  Audio Manager (Web Audio API, zero external files)
  // ============================================================
  const AudioManager = {
    _ctx: null,
    _sfxGain: null,
    _bgGain: null,
    _bgPlaying: false,
    _bgAudio: null,
    _bgVolume: 0.15,
    _sfxVolume: 0.7,
    _bgTrack: 0,
    _bgTracks: [
      'bg1.mp3',
      'bg2.mp3',
      'bg3.mp3'
    ],

    _ctxReady() {
      if (!this._ctx) {
        const Ctor = window.AudioContext || window.webkitAudioContext;
        if (!Ctor) return false;
        this._ctx = new Ctor();
        this._sfxGain = this._ctx.createGain();
        this._sfxGain.gain.value = this._sfxVolume;
        this._sfxGain.connect(this._ctx.destination);
        this._bgGain = this._ctx.createGain();
        this._bgGain.gain.value = this._bgVolume;
        this._bgGain.connect(this._ctx.destination);
      }
      if (this._ctx.state === 'suspended') this._ctx.resume();
      return true;
    },

    setSfxVolume(v) {
      this._sfxVolume = v;
      if (this._sfxGain) this._sfxGain.gain.setValueAtTime(v, this._ctx.currentTime);
    },

    setBgVolume(v) {
      this._bgVolume = v;
      if (this._bgAudio) this._bgAudio.volume = v;
      if (this._bgGain) this._bgGain.gain.setValueAtTime(v, this._ctx.currentTime);
    },

    // —— Click sound: gentle short tap ——
    playClick() {
      if (!this._ctxReady()) return;
      const t = this._ctx.currentTime;
      const osc = this._ctx.createOscillator();
      const gain = this._ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(660, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.06);
      gain.gain.setValueAtTime(0.3 * this._sfxVolume, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.connect(gain).connect(this._sfxGain);
      osc.start(t);
      osc.stop(t + 0.08);
    },

    // —— Flag sound: slightly different pitch ——
    playFlag() {
      if (!this._ctxReady()) return;
      const t = this._ctx.currentTime;
      const osc = this._ctx.createOscillator();
      const gain = this._ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(660, t + 0.08);
      gain.gain.setValueAtTime(0.25 * this._sfxVolume, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.connect(gain).connect(this._sfxGain);
      osc.start(t);
      osc.stop(t + 0.1);
    },

    // —— Explosion: clean "彭" thump ——
    playExplosion() {
      if (!this._ctxReady()) return;
      const t = this._ctx.currentTime;
      // Deep thump: sine sweep 120→30Hz, boosted gain
      const osc = this._ctx.createOscillator();
      const g1 = this._ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.18);
      g1.gain.setValueAtTime(1.2 * this._sfxVolume, t);
      g1.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(g1).connect(this._sfxGain);
      osc.start(t);
      osc.stop(t + 0.25);
      // Noise impact with low-pass
      const bufferSize = this._ctx.sampleRate * 0.2;
      const buffer = this._ctx.createBuffer(1, bufferSize, this._ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }
      const noise = this._ctx.createBufferSource();
      const g2 = this._ctx.createGain();
      const lp = this._ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 600;
      noise.buffer = buffer;
      g2.gain.setValueAtTime(0.6 * this._sfxVolume, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      noise.connect(lp).connect(g2).connect(this._sfxGain);
      noise.start(t);
    },

    // —— Win jingle: ascending cheerful notes ——
    playWin() {
      if (!this._ctxReady()) return;
      const t = this._ctx.currentTime;
      const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
      notes.forEach((freq, i) => {
        const osc = this._ctx.createOscillator();
        const g = this._ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const start = t + i * 0.15;
        g.gain.setValueAtTime(0.35 * this._sfxVolume, start);
        g.gain.exponentialRampToValueAtTime(0.001, start + 0.25);
        osc.connect(g).connect(this._sfxGain);
        osc.start(start);
        osc.stop(start + 0.25);
      });
    },

    // —— Background music ——
    setBgTrack(index) {
      if (this._bgTrack === index) return;
      const wasPlaying = this._bgPlaying;
      this.stopBg();
      this._bgTrack = index;
      if (wasPlaying) this.startBg();
    },

    startBg() {
      if (this._bgAudio) return;
      this._bgPlaying = true;
      const url = this._bgTracks[this._bgTrack];
      if (!url) return;
      this._bgAudio = new Audio(url);
      this._bgAudio.loop = true;
      this._bgAudio.volume = this._bgVolume;
      this._bgAudio.play().catch(() => { });
    },

    stopBg() {
      this._bgPlaying = false;
      if (this._bgAudio) {
        this._bgAudio.pause();
        this._bgAudio = null;
      }
    },
  };

  // ============================================================
  //  Helpers
  // ============================================================
  const flashOverlay = document.getElementById('flashOverlay');
  function flashScreen() {
    flashOverlay.classList.remove('active');
    void flashOverlay.offsetWidth;
    flashOverlay.classList.add('active');
    // Vibration - try pattern with pauses for better device compatibility
    if ('vibrate' in navigator) {
      navigator.vibrate([100, 80, 100, 80, 100]);
    }
  }

  function pad2(n) { return String(n).padStart(2, '0'); }
  function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${pad2(m)}:${pad2(s)}`;
  }
  function fmtDate(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  }
  function getCellSize(rows, cols) {
    // Dynamic cell size based on grid dimensions
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxW = Math.min(vw * 0.92 - 12, 720);
    const maxH = Math.min(vh * 0.6 - 12, 600);
    const sizeByW = Math.floor(maxW / cols);
    const sizeByH = Math.floor(maxH / rows);
    let size = Math.min(sizeByW, sizeByH);
    size = Math.max(10, Math.min(size, 42));
    return size;
  }

  // ============================================================
  //  Board logic
  // ============================================================
  function createBoard(rows, cols, mines) {
    const b = [];
    for (let r = 0; r < rows; r++) {
      b[r] = [];
      for (let c = 0; c < cols; c++) {
        b[r][c] = { mine: false, revealed: false, flagged: false, adjacent: 0 };
      }
    }
    return b;
  }

  function placeMines(board, rows, cols, totalMines, excludeR, excludeC) {
    let placed = 0;
    // Exclusion zone: the clicked cell + its neighbors (first click safe)
    const excluded = new Set();
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = excludeR + dr;
        const nc = excludeC + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          excluded.add(nr * cols + nc);
        }
      }
    }
    while (placed < totalMines) {
      const r = Math.floor(Math.random() * rows);
      const c = Math.floor(Math.random() * cols);
      const key = r * cols + c;
      if (!board[r][c].mine && !excluded.has(key)) {
        board[r][c].mine = true;
        placed++;
      }
    }
    // Calculate adjacent counts
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (board[r][c].mine) continue;
        let count = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].mine) count++;
          }
        }
        board[r][c].adjacent = count;
      }
    }
  }

  function floodFill(board, rows, cols, r, c) {
    const stack = [[r, c]];
    let count = 0;
    while (stack.length > 0) {
      const [cr, cc] = stack.pop();
      if (cr < 0 || cr >= rows || cc < 0 || cc >= cols) continue;
      const cell = board[cr][cc];
      if (cell.revealed || cell.flagged || cell.mine) continue;
      cell.revealed = true;
      count++;
      if (cell.adjacent === 0) {
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            stack.push([cr + dr, cc + dc]);
          }
        }
      }
    }
    return count;
  }

  function checkWin(board, rows, cols, totalMines) {
    let revealed = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (board[r][c].revealed) revealed++;
      }
    }
    return revealed === rows * cols - totalMines;
  }

  function revealAllMines(board, rows, cols, hitR, hitC) {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (board[r][c].mine) {
          board[r][c].revealed = true;
          if (r === hitR && c === hitC) {
            board[r][c]._hit = true;
          }
        }
      }
    }
  }

  // ============================================================
  //  Game lifecycle
  // ============================================================
  function initGame(diffKey, keepSave = false) {
    // Stop any running timer
    stopTimer();

    // Apply custom config if needed
    if (diffKey === 'custom') {
      applyCustomConfigToDifficulty();
    }

    const diff = DIFFICULTIES[diffKey];
    state.difficulty = diffKey;
    state.rows = diff.rows;
    state.cols = diff.cols;
    state.totalMines = diff.mines;
    state.flagsPlaced = 0;
    state.revealedCount = 0;
    state.status = 'idle';
    state.firstClick = true;
    state.gameOver = false;
    state.timer = 0;
    state.timeLimit = diff.timeLimit;
    state.timerMode = diff.timeLimit > 0 ? 'countdown' : 'elapsed';

    state.board = createBoard(diff.rows, diff.cols, diff.mines);
    // Reset flag mode when changing difficulty
    state.flagMode = false;
    flagToggle.classList.remove('active');

    if (!keepSave) clearSave();
    renderDifficultyBtns();
    updateInfoBar();
    statusMsg.textContent = diff.timeLimit > 0
      ? `点击格子开始游戏（限时 ${fmtTime(diff.timeLimit)}）`
      : '点击格子开始游戏';
    statusMsg.className = 'status-msg';
    renderBoard();
    autoSave();
  }

  function startGame(firstR, firstC) {
    const diff = DIFFICULTIES[state.difficulty];
    state.firstClick = false;
    state.status = 'playing';
    // Place mines avoiding first click
    placeMines(state.board, state.rows, state.cols, state.totalMines, firstR, firstC);
    startTimer();
    // Reveal first cell
    revealCell(firstR, firstC);
    if (state.gameOver) return;
    statusMsg.textContent = '游戏进行中...';
    statusMsg.className = 'status-msg';
    autoSave();
  }

  function revealCell(r, c) {
    if (state.gameOver) return false;
    if (r < 0 || r >= state.rows || c < 0 || c >= state.cols) return false;
    const cell = state.board[r][c];
    if (cell.revealed || cell.flagged) return false;

    // First click → start game (place mines, then reveal)
    if (state.firstClick) {
      startGame(r, c);
      return true;
    }

    if (cell.mine) {
      AudioManager.playExplosion();
      // Game over
      cell._hit = true;
      revealAllMines(state.board, state.rows, state.cols, r, c);
      state.status = 'lost';
      state.gameOver = true;
      stopTimer();
      statusMsg.textContent = '💥 踩雷了！游戏结束';
      statusMsg.className = 'status-msg lose';
      renderBoard();
      // Trigger shake animation
      boardWrapper.style.animation = 'none';
      void boardWrapper.offsetWidth;
      boardWrapper.style.animation = 'shake 0.4s ease';
      flashScreen();
      clearSave();
      return false;
    }

    // Flood fill
    AudioManager.playClick();
    const revealed = floodFill(state.board, state.rows, state.cols, r, c);
    state.revealedCount += revealed;
    renderBoard();
    updateInfoBar();

    // Check win
    if (checkWin(state.board, state.rows, state.cols, state.totalMines)) {
      AudioManager.playWin();
      state.status = 'won';
      state.gameOver = true;
      stopTimer();
      statusMsg.textContent = '🎉 恭喜通关！';
      statusMsg.className = 'status-msg win';
      boardWrapper.style.animation = 'none';
      void boardWrapper.offsetWidth;
      boardWrapper.style.animation = 'boardWinPulse 0.8s ease 2';
      startFireworks();
      // Auto flag remaining mines
      for (let rr = 0; rr < state.rows; rr++) {
        for (let cc = 0; cc < state.cols; cc++) {
          if (state.board[rr][cc].mine && !state.board[rr][cc].flagged) {
            state.board[rr][cc].flagged = true;
            state.flagsPlaced++;
          }
        }
      }
      updateInfoBar();
      saveRecord();
      clearSave();
      return true;
    }

    autoSave();
    return true;
  }

  function toggleFlag(r, c) {
    if (state.gameOver) return;
    if (state.firstClick) return; // Must click first
    if (r < 0 || r >= state.rows || c < 0 || c >= state.cols) return;
    const cell = state.board[r][c];
    if (cell.revealed) return;
    cell.flagged = !cell.flagged;
    AudioManager.playFlag();
    state.flagsPlaced += cell.flagged ? 1 : -1;
    renderBoard();
    updateInfoBar();
    autoSave();
  }

  function chordReveal(r, c) {
    if (state.gameOver) return;
    const cell = state.board[r][c];
    if (!cell.revealed || cell.adjacent === 0) return;
    // Count flags around
    let flagCount = 0;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols && state.board[nr][nc].flagged) flagCount++;
      }
    }
    if (flagCount === cell.adjacent) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
            revealCell(nr, nc);
          }
        }
      }
    }
  }

  // ============================================================
  //  Timer
  // ============================================================
  function startTimer() {
    stopTimer();
    state.timer = 0;
    state.timerInterval = setInterval(() => {
      state.timer++;
      if (state.timerMode === 'countdown') {
        const remaining = Math.max(0, state.timeLimit - state.timer);
        timerEl.textContent = `⏱ ${fmtTime(remaining)}`;
        if (remaining <= 60) timerEl.classList.add('danger');
        if (remaining <= 0) {
          // Time's up → game over
          stopTimer();
          AudioManager.playExplosion();
          state.status = 'lost';
          state.gameOver = true;
          statusMsg.textContent = '⏰ 时间到！游戏结束';
          statusMsg.className = 'status-msg lose';
          revealAllMines(state.board, state.rows, state.cols, -1, -1);
          renderBoard();
          boardWrapper.style.animation = 'none';
          void boardWrapper.offsetWidth;
          boardWrapper.style.animation = 'shake 0.4s ease';
          flashScreen();
          clearSave();
        }
      } else {
        timerEl.textContent = `⏱ ${fmtTime(state.timer)}`;
      }
    }, 1000);
  }

  function stopTimer() {
    if (state.timerInterval) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
    }
    timerEl.classList.remove('danger');
  }

  // ============================================================
  //  Render
  // ============================================================
  function renderBoard() {
    const cellSize = getCellSize(state.rows, state.cols);
    boardEl.style.setProperty('--cell-size', cellSize + 'px');
    boardEl.style.gridTemplateColumns = `repeat(${state.cols}, var(--cell-size))`;
    boardEl.innerHTML = '';

    for (let r = 0; r < state.rows; r++) {
      for (let c = 0; c < state.cols; c++) {
        const cell = state.board[r][c];
        const div = document.createElement('div');
        div.className = 'cell';
        div.dataset.r = r;
        div.dataset.c = c;

        if (cell.revealed) {
          if (cell.mine) {
            div.classList.add(cell._hit ? 'mine-hit' : 'mine-revealed');
          } else {
            div.classList.add('revealed');
            if (cell.adjacent > 0) {
              div.classList.add('n' + cell.adjacent);
              div.textContent = cell.adjacent;
            } else {
              div.classList.add('n0');
            }
          }
        } else {
          div.classList.add('hidden');
          if (cell.flagged) {
            div.classList.add('flagged');
          }
        }

        // Click (left-click or tap)
        div.addEventListener('click', (e) => {
          e.preventDefault();
          if (state.flagMode) {
            toggleFlag(r, c);
          } else {
            revealCell(r, c);
          }
        });

        // Right-click (desktop flag)
        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          toggleFlag(r, c);
        });

        // Double-click / chord
        div.addEventListener('dblclick', (e) => {
          e.preventDefault();
          chordReveal(r, c);
        });

        boardEl.appendChild(div);
      }
    }
  }

  function updateInfoBar() {
    const remaining = state.totalMines - state.flagsPlaced;
    mineCountEl.textContent = `💣 ${pad2(Math.max(0, remaining))}`;
    if (state.timerMode === 'countdown') {
      const remainingTime = Math.max(0, state.timeLimit - state.timer);
      timerEl.textContent = `⏱ ${fmtTime(remainingTime)}`;
      if (remainingTime <= 60) timerEl.classList.add('danger');
    } else {
      timerEl.textContent = `⏱ ${fmtTime(state.timer)}`;
    }
  }

  function renderDifficultyBtns() {
    document.querySelectorAll('.difficulty-bar button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.diff === state.difficulty);
    });
  }

  // ============================================================
  //  Records (flat, newest first, max 10)
  // ============================================================
  function getRecords() {
    try {
      const data = localStorage.getItem(STORAGE_KEYS.records);
      return data ? JSON.parse(data) : [];
    } catch { return []; }
  }

  function saveRecord() {
    const records = getRecords();
    const diff = DIFFICULTIES[state.difficulty];
    const elapsed = state.timer;
    records.unshift({
      difficulty: state.difficulty,
      difficultyLabel: diff.label,
      time: elapsed,
      timeStr: fmtTime(elapsed),
      date: Date.now(),
      dateStr: fmtDate(Date.now()),
      rows: state.rows,
      cols: state.cols,
      mines: state.totalMines,
    });
    const trimmed = records.slice(0, 10);
    try {
      localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(trimmed));
    } catch { }
  }

  function showRecords() {
    const records = getRecords();
    recordsBody.innerHTML = '';
    if (records.length === 0) {
      recordsBody.innerHTML = '<tr><td colspan="4" class="empty-msg">暂无通关记录</td></tr>';
    } else {
      records.forEach((rec, i) => {
        const tr = document.createElement('tr');
        let label;
        if (rec.difficulty === 'custom') {
          label = `${rec.difficultyLabel || '自定义'} (${rec.cols}×${rec.rows}, ${rec.mines}雷)`;
        } else {
          label = `${rec.difficultyLabel} (${rec.cols}×${rec.rows})`;
        }
        tr.innerHTML = `<td>${i + 1}</td>
        <td>${label}</td>
        <td>${rec.timeStr}</td>
        <td>${rec.dateStr}</td>`;
        recordsBody.appendChild(tr);
      });
    }
    recordsModal.classList.add('show');
  }

  // ============================================================
  //  Leaderboard (per-difficulty buckets)
  // ============================================================
  const LB_STORAGE_KEY = 'ms_leaderboard';
  const LB_LIMIT = 10;
  const LB_KEYS = ['easy', 'medium', 'hard', 'hell', 'custom'];
  const LB_RULES = {
    easy: '😊 简单 9×9 · 按用时从少到多排序，最快在前',
    medium: '🤔 中等 16×16 · 按用时从少到多排序，最快在前',
    hard: '😈 困难 24×20 · 按用时从少到多排序，最快在前',
    hell: '🔥 地狱 28×30 · 按用时从少到多排序，最快在前',
    custom: '🎨 自定义 · 按通关时间倒序，最新在前',
  };

  function getLeaderboard() {
    try {
      const data = localStorage.getItem(LB_STORAGE_KEY);
      if (!data) return {};
      const parsed = JSON.parse(data);
      if (Array.isArray(parsed)) return {};
      LB_KEYS.forEach(k => { if (!Array.isArray(parsed[k])) parsed[k] = []; });
      return parsed;
    } catch { return {}; }
  }

  function saveLeaderboard() {
    const all = getLeaderboard();
    const key = state.difficulty;
    const diff = DIFFICULTIES[key];
    const elapsed = state.timer;
    const rec = {
      time: elapsed,
      timeStr: fmtTime(elapsed),
      date: Date.now(),
      dateStr: fmtDate(Date.now()),
      rows: state.rows,
      cols: state.cols,
      mines: state.totalMines,
      difficultyLabel: diff.label,
    };
    if (!all[key]) all[key] = [];
    all[key].push(rec);
    // Sort: fixed difficulties by time ascending, custom by date descending
    if (key === 'custom') {
      all[key].sort((a, b) => b.date - a.date);
    } else {
      all[key].sort((a, b) => a.time - b.time);
    }
    all[key] = all[key].slice(0, LB_LIMIT);
    try {
      localStorage.setItem(LB_STORAGE_KEY, JSON.stringify(all));
    } catch { }
  }

  // Also save leaderboard when saving records
  const _origSaveRecord = saveRecord;
  saveRecord = function () {
    _origSaveRecord();
    saveLeaderboard();
  };

  const lbBody = document.getElementById('lbBody');
  const lbRule = document.getElementById('lbRule');
  const leaderboardModal = document.getElementById('leaderboardModal');
  let _lbTab = null;

  const lbTabRule = {
    easy: '😊 简单 9×9 · 按用时从少到多排序，取前 10 名',
    medium: '🤔 中等 16×16 · 按用时从少到多排序，取前 10 名',
    hard: '😈 困难 24×20 · 按用时从少到多排序，取前 10 名',
    hell: '🔥 地狱 28×30 · 按用时从少到多排序，取前 10 名',
    custom: '🎨 自定义 · 按通关时间倒序，最新在前，取前 10 名',
  };

  function showLeaderboard(preferredTab) {
    const all = getLeaderboard();
    const tab = preferredTab || state.difficulty;
    _lbTab = tab;
    renderLeaderboardTab(all, tab);
    document.querySelectorAll('#lbTabs .records-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    lbRule.textContent = lbTabRule[tab] || '';
    leaderboardModal.classList.add('show');
  }

  function renderLeaderboardTab(all, tab) {
    const records = (all[tab] || []);
    lbBody.innerHTML = '';
    if (records.length === 0) {
      lbBody.innerHTML = '<tr><td colspan="4" class="empty-msg">暂无记录</td></tr>';
      return;
    }
    records.forEach((rec, i) => {
      const tr = document.createElement('tr');
      let modeLabel;
      if (tab === 'custom') {
        modeLabel = `${rec.difficultyLabel || '自定义'} (${rec.cols}×${rec.rows}, ${rec.mines}雷)`;
      } else {
        modeLabel = `${rec.difficultyLabel} (${rec.cols}×${rec.rows})`;
      }
      tr.innerHTML = `<td>${i + 1}</td>
        <td>${modeLabel}</td>
        <td>${rec.timeStr}</td>
        <td>${rec.dateStr}</td>`;
      lbBody.appendChild(tr);
    });
  }

  // ============================================================
  //  Custom Modal
  // ============================================================
  function openCustomModal() {
    const cfg = getCustomConfig();
    document.getElementById('customCols').value = cfg ? cfg.cols : 15;
    document.getElementById('customRows').value = cfg ? cfg.rows : 15;
    document.getElementById('customMines').value = cfg ? cfg.mines : 50;
    document.getElementById('customTimeLimit').value = cfg ? cfg.timeLimit : 0;
    updateMinesHint();
    document.getElementById('customFormError').textContent = '';
    document.querySelectorAll('.custom-form input').forEach(el => el.classList.remove('error'));
    document.getElementById('customModal').classList.add('show');
  }

  function updateMinesHint() {
    const rows = parseInt(document.getElementById('customRows').value) || 15;
    const cols = parseInt(document.getElementById('customCols').value) || 15;
    const maxMines = rows * cols - 1;
    const hint = document.getElementById('minesHint');
    hint.textContent = `1 ~ ${maxMines}`;
    const minesInput = document.getElementById('customMines');
    minesInput.max = maxMines;
    if (parseInt(minesInput.value) > maxMines) minesInput.value = maxMines;
  }

  function validateCustomForm() {
    const rows = parseInt(document.getElementById('customRows').value);
    const cols = parseInt(document.getElementById('customCols').value);
    const mines = parseInt(document.getElementById('customMines').value);
    const timeLimit = parseInt(document.getElementById('customTimeLimit').value);
    const errEl = document.getElementById('customFormError');

    // Reset errors
    document.querySelectorAll('.custom-form input').forEach(el => el.classList.remove('error'));

    if (isNaN(rows) || rows < 5 || rows > 50) {
      errEl.textContent = '高度请输入 5 ~ 50 之间的数字';
      document.getElementById('customRows').classList.add('error');
      return null;
    }
    if (isNaN(cols) || cols < 5 || cols > 50) {
      errEl.textContent = '宽度请输入 5 ~ 50 之间的数字';
      document.getElementById('customCols').classList.add('error');
      return null;
    }
    const maxMines = rows * cols - 1;
    if (isNaN(mines) || mines < 1 || mines > maxMines) {
      errEl.textContent = `雷数请输入 1 ~ ${maxMines} 之间的数字`;
      document.getElementById('customMines').classList.add('error');
      return null;
    }
    if (isNaN(timeLimit) || timeLimit < 0 || timeLimit > 3600) {
      errEl.textContent = '限时请输入 0 ~ 3600 之间的数字（0=不限时）';
      document.getElementById('customTimeLimit').classList.add('error');
      return null;
    }
    errEl.textContent = '';
    return { rows, cols, mines, timeLimit };
  }

  function applyCustomSettings() {
    const result = validateCustomForm();
    if (!result) return;
    saveCustomConfig(result.rows, result.cols, result.mines, result.timeLimit);
    document.getElementById('customModal').classList.remove('show');
    if (state.status === 'playing') {
      clearSave();
    }
    initGame('custom');
  }

  // ============================================================
  //  Save / Load (localStorage)
  // ============================================================
  function autoSave() {
    if (state.status === 'won' || state.status === 'lost') return;
    if (state.firstClick) return; // nothing to save yet
    const saveData = {
      difficulty: state.difficulty,
      board: state.board.map(row => row.map(cell => ({
        mine: cell.mine,
        revealed: cell.revealed,
        flagged: cell.flagged,
        adjacent: cell.adjacent,
        _hit: cell._hit || false,
      }))),
      timer: state.timer,
      flagsPlaced: state.flagsPlaced,
      status: state.status,
      gameOver: state.gameOver,
      firstClick: state.firstClick,
      timeLimit: state.timeLimit,
      timerMode: state.timerMode,
      totalMines: state.totalMines,
      rows: state.rows,
      cols: state.cols,
      timestamp: Date.now(),
    };
    try {
      localStorage.setItem(STORAGE_KEYS.save, JSON.stringify(saveData));
    } catch { }
  }

  function clearSave() {
    try { localStorage.removeItem(STORAGE_KEYS.save); } catch { }
  }

  function hasSavedGame() {
    try { return localStorage.getItem(STORAGE_KEYS.save) !== null; } catch { return false; }
  }

  // ---- Confirm dialog (replaces native confirm()) ----
  function showConfirm(msg) {
    return new Promise((resolve) => {
      const dialog = document.getElementById('confirmDialog');
      const msgEl = document.getElementById('confirmMsg');
      const okBtn = document.getElementById('confirmOk');
      const cancelBtn = document.getElementById('confirmCancel');

      msgEl.textContent = msg;
      dialog.classList.add('show');

      const cleanup = (result) => {
        dialog.classList.remove('show');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        resolve(result);
      };

      const onOk = () => cleanup(true);
      const onCancel = () => cleanup(false);

      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
    });
  }

  // ---- Custom config ----
  function getCustomConfig() {
    try {
      const data = localStorage.getItem(STORAGE_KEYS.custom);
      if (data) {
        const cfg = JSON.parse(data);
        // Validate
        if (cfg.rows && cfg.cols && cfg.mines >= 1 && cfg.cols >= 5) {
          return cfg;
        }
      }
    } catch { }
    return null;
  }

  function saveCustomConfig(rows, cols, mines, timeLimit) {
    try {
      localStorage.setItem(STORAGE_KEYS.custom, JSON.stringify({ rows, cols, mines, timeLimit }));
    } catch { }
  }

  function applyCustomConfigToDifficulty() {
    const cfg = getCustomConfig();
    if (cfg) {
      DIFFICULTIES.custom.rows = cfg.rows;
      DIFFICULTIES.custom.cols = cfg.cols;
      DIFFICULTIES.custom.mines = cfg.mines;
      DIFFICULTIES.custom.timeLimit = cfg.timeLimit;
    }
  }

  function loadSavedGame() {
    try {
      const data = localStorage.getItem(STORAGE_KEYS.save);
      if (!data) return false;
      const saved = JSON.parse(data);

      // Restore state
      state.difficulty = saved.difficulty;
      state.rows = saved.rows || saved.board.length;
      state.cols = saved.cols || saved.board[0].length;
      state.totalMines = saved.totalMines || DIFFICULTIES[saved.difficulty].mines;
      state.board = saved.board;
      state.timer = saved.timer;
      state.flagsPlaced = saved.flagsPlaced;
      state.status = saved.status;
      state.gameOver = saved.gameOver;
      state.firstClick = saved.firstClick;
      state.timeLimit = saved.timeLimit;
      state.timerMode = saved.timerMode;

      renderDifficultyBtns();
      updateInfoBar();
      if (state.status === 'playing') {
        startTimer();
        statusMsg.textContent = '游戏进行中...';
        statusMsg.className = 'status-msg';
      } else if (state.status === 'won') {
        statusMsg.textContent = '🎉 恭喜通关！';
        statusMsg.className = 'status-msg win';
      } else if (state.status === 'lost') {
        statusMsg.textContent = '💥 游戏结束';
        statusMsg.className = 'status-msg lose';
      }
      renderBoard();
      return true;
    } catch {
      clearSave();
      return false;
    }
  }

  // ============================================================
  //  Event Bindings
  // ============================================================

  // Difficulty buttons
  document.querySelectorAll('.difficulty-bar button').forEach(btn => {
    btn.addEventListener('click', async () => {
      const diff = btn.dataset.diff;
      if (diff === state.difficulty && state.firstClick) return;
      // Custom: show settings modal
      if (diff === 'custom') {
        if (state.status === 'playing') {
          if (!await showConfirm('当前游戏正在进行中，确定要修改设置吗？')) return;
        }
        openCustomModal();
        return;
      }
      // Check if game in progress
      if (state.status === 'playing') {
        if (!await showConfirm('当前游戏正在进行中，确定要开始新游戏吗？')) return;
      }
      clearSave();
      initGame(diff);
    });
  });

  // New game button
  document.getElementById('btnNew').addEventListener('click', async () => {
    if (state.status === 'playing') {
      if (!await showConfirm('当前游戏正在进行中，确定要重新开始吗？')) return;
    }
    clearSave();
    initGame(state.difficulty);
  });

  // Flag toggle (mobile)
  flagToggle.addEventListener('click', () => {
    state.flagMode = !state.flagMode;
    flagToggle.classList.toggle('active', state.flagMode);
  });

  // Leaderboard tab switching
  document.getElementById('lbTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.records-tab');
    if (!btn) return;
    const tab = btn.dataset.tab;
    if (tab === _lbTab) return;
    _lbTab = tab;
    document.querySelectorAll('#lbTabs .records-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    renderLeaderboardTab(getLeaderboard(), tab);
    lbRule.textContent = lbTabRule[tab] || '';
  });

  document.getElementById('btnRecords').addEventListener('click', showRecords);
  document.getElementById('btnLeaderboard').addEventListener('click', () => showLeaderboard());

  // Modal close via overlay
  recordsModal.addEventListener('click', (e) => {
    if (e.target === recordsModal) recordsModal.classList.remove('show');
  });

  // Leaderboard close via overlay
  leaderboardModal.addEventListener('click', (e) => {
    if (e.target === leaderboardModal) leaderboardModal.classList.remove('show');
  });

  // ---- Custom modal ----
  document.getElementById('customApply').addEventListener('click', applyCustomSettings);
  document.getElementById('customCancel').addEventListener('click', () => {
    document.getElementById('customModal').classList.remove('show');
  });
  document.getElementById('customModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('customModal')) {
      document.getElementById('customModal').classList.remove('show');
    }
  });
  // Update mines hint when rows/cols change
  document.getElementById('customRows').addEventListener('input', updateMinesHint);
  document.getElementById('customCols').addEventListener('input', updateMinesHint);
  // Enter key to submit
  document.querySelectorAll('#customModal input').forEach(el => {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyCustomSettings();
    });
  });

  // Resume buttons
  const resumeToast = document.getElementById('resumeToast');
  document.getElementById('resumeYes').addEventListener('click', () => {
    resumeToast.classList.remove('show');
    if (loadSavedGame()) {
      document.getElementById('btnResume').style.display = 'none';
    } else {
      initGame(state.difficulty);
    }
  });
  document.getElementById('resumeNo').addEventListener('click', () => {
    resumeToast.classList.remove('show');
    clearSave();
    initGame(state.difficulty);
  });

  document.getElementById('btnResume').addEventListener('click', () => {
    loadSavedGame();
    document.getElementById('btnResume').style.display = 'none';
  });

  // Keyboard shortcut: F for flag toggle
  document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
      flagToggle.click();
    }
  });

  // ---- Settings modal ----
  const settingsModal = document.getElementById('settingsModal');
  const sfxSlider = document.getElementById('sfxVolume');
  const bgSlider = document.getElementById('bgVolume');
  const sfxLabel = document.getElementById('sfxVolLabel');
  const bgLabel = document.getElementById('bgVolLabel');

  document.getElementById('btnSettingsTop').addEventListener('click', () => {
    sfxSlider.value = Math.round(AudioManager._sfxVolume * 100);
    bgSlider.value = Math.round(AudioManager._bgVolume * 100);
    sfxLabel.textContent = sfxSlider.value;
    bgLabel.textContent = bgSlider.value;
    // Select current bg track
    const radios = document.querySelectorAll('input[name="bgTrack"]');
    radios.forEach(r => r.checked = parseInt(r.value) === AudioManager._bgTrack);
    settingsModal.classList.add('show');
  });

  sfxSlider.addEventListener('input', () => {
    const v = parseFloat(sfxSlider.value) / 100;
    sfxLabel.textContent = sfxSlider.value;
    AudioManager.setSfxVolume(v);
  });

  bgSlider.addEventListener('input', () => {
    const v = parseFloat(bgSlider.value) / 100;
    bgLabel.textContent = bgSlider.value;
    AudioManager.setBgVolume(v);
  });

  // BGM track selection
  document.querySelectorAll('input[name="bgTrack"]').forEach(radio => {
    radio.addEventListener('change', () => {
      AudioManager.setBgTrack(parseInt(radio.value));
    });
  });

  settingsModal.addEventListener('click', (e) => {
    if (e.target === settingsModal) settingsModal.classList.remove('show');
  });

  // ============================================================
  //  Fireworks animation (DOM-based confetti, no canvas issues)
  // ============================================================
  let _fireworksTimer = null;

  function startFireworks() {
    // Clean up any previous fireworks
    stopFireworks();

    const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#01a3a4', '#f368e0', '#ff6348', '#7bed9f'];
    const container = document.body;
    const particles = [];
    const burstCount = 6;
    const particlesPerBurst = 50;

    // Create initial bursts
    for (let b = 0; b < burstCount; b++) {
      const cx = window.innerWidth * (0.15 + Math.random() * 0.7);
      const cy = window.innerHeight * (0.15 + Math.random() * 0.6);
      createBurst(cx, cy, particlesPerBurst);
    }

    function createBurst(cx, cy, count) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        const size = 4 + Math.random() * 6;
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 10;
        el.style.cssText = `
            position: fixed; left:${cx}px; top:${cy}px; width:${size}px; height:${size}px;
            background:${colors[Math.floor(Math.random() * colors.length)]};
            border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
            pointer-events:none; z-index:9999;
            transform:translate(-50%,-50%);
          `;
        container.appendChild(el);
        particles.push({
          el, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.008 + Math.random() * 0.015,
          rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 10,
        });
      }
    }

    let frame = 0;
    let animId;

    function animate() {
      frame++;
      let alive = false;
      for (const p of particles) {
        if (!p.el) continue;
        if (p.life <= 0) {
          if (p.el.parentNode) p.el.parentNode.removeChild(p.el);
          p.el = null;
          continue;
        }
        alive = true;
        p.vy += 0.12; // gravity
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.life -= p.decay;
        p.rot += p.rotSpeed;
        const x = parseFloat(p.el.style.left) + p.vx;
        const y = parseFloat(p.el.style.top) + p.vy;
        p.el.style.left = x + 'px';
        p.el.style.top = y + 'px';
        p.el.style.transform = `translate(-50%,-50%) rotate(${p.rot}deg)`;
        p.el.style.opacity = Math.max(0, p.life);
      }

      // Spawn new bursts periodically
      if (frame < 120 && frame % 15 === 0) {
        const cx = window.innerWidth * (0.15 + Math.random() * 0.7);
        const cy = window.innerHeight * (0.15 + Math.random() * 0.6);
        createBurst(cx, cy, 35);
      }

      if (alive || frame < 120) {
        animId = requestAnimationFrame(animate);
      } else {
        // Final cleanup: remove any remaining elements
        for (const p of particles) {
          if (p.el && p.el.parentNode) p.el.parentNode.removeChild(p.el);
        }
        particles.length = 0;
        if (animId) cancelAnimationFrame(animId);
        _fireworksTimer = null;
      }
    }

    animId = requestAnimationFrame(animate);
    _fireworksTimer = { cancel: () => { if (animId) cancelAnimationFrame(animId); } };
  }

  function stopFireworks() {
    if (_fireworksTimer) {
      // Remove all confetti elements from DOM
      const els = document.querySelectorAll('div[style*="z-index:9999"]');
      for (const el of els) el.remove();
      _fireworksTimer = null;
    }
  }

  // ============================================================
  //  Init
  // ============================================================
  // Start background music on the very first user click (browser autoplay policy)
  (function initBgOnFirstClick() {
    const handler = () => {
      AudioManager.startBg();
      document.removeEventListener('click', handler);
    };
    document.addEventListener('click', handler);
  })();

  window.addEventListener('DOMContentLoaded', () => {
    // Check saved game first — don't init yet if we need to resume
    if (hasSavedGame()) {
      // Load saved data to restore difficulty settings, but don't clear save
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEYS.save));
      applyCustomConfigToDifficulty();
      initGame(saved.difficulty, true);
      resumeToast.classList.add('show');
    } else {
      initGame('easy');
    }

    // Auto-recalculate cell size on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (state.board.length > 0) renderBoard();
      }, 200);
    });

    // Save game when user switches tabs or closes the page
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) autoSave();
    });
    window.addEventListener('beforeunload', () => {
      autoSave();
    });
  });
</script>
</body>
